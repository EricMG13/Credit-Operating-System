name: CI

on:
  push:
    branches: [main, caos-app]
  pull_request:

jobs:
  frontend:
    name: Frontend — lint, typecheck, test, build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: caos/frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: caos/frontend/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npx tsc --noEmit
      - run: npm test
      - run: npx next build

  server:
    name: Server — pytest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: caos/server/requirements.txt
      - run: pip install -r caos/server/requirements.txt pytest httpx
      - run: python -m pytest caos/tests/server -q
