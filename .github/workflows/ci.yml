name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same ref (rapid re-pushes to a PR branch).
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    name: Frontend — lint, typecheck, test, build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: caos/frontend
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 26
          cache: npm
          cache-dependency-path: caos/frontend/package-lock.json
      - run: npm ci
      - run: npm run lint -- --max-warnings=0
      - run: npx tsc --noEmit
      - run: npm test
      - run: npm run build

  server:
    name: Server — pytest
    runs-on: ubuntu-latest
    # Test on BOTH the CI floor (3.11) and the runtime the deploy image ships
    # (3.14, Dockerfile) so runtime behavior on the deployed interpreter is
    # actually exercised, not just the pip install. (audit P1)
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.14"]
    services:
      postgres:
        # pgvector image (matches the deploy stack's db) so migration 0030's
        # `CREATE EXTENSION vector` succeeds — plain postgres:18 lacks pgvector
        # and the worker-lease tests error at schema setup.
        image: pgvector/pgvector:pg18
        env:
          POSTGRES_PASSWORD: postgres
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready --health-interval 10s
          --health-timeout 5s --health-retries 5
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0 # full history so the complexity gate can diff the PR base
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: caos/server/requirements.txt
      # Lint gate first — fails fast on dead imports / quality regressions
      # before the heavier dependency install (config: ruff.toml).
      - run: pip install ruff==0.15.18
      - run: ruff check caos/server caos/tests
      # Complexity gate — C901 (cyclomatic > 10) on the Python files THIS PR
      # changed, mirroring the fallow new-only gate: never re-litigates the
      # existing backlog, blocks new/edited functions that cross the threshold.
      # A `# noqa: C901` marks a pre-existing offender when its file is next touched.
      - name: Complexity gate (changed Python)
        if: github.event_name == 'pull_request'
        run: |
          base="origin/${{ github.base_ref }}"
          # Three-dot (merge-base) scope so a file only changed on base since divergence
          # isn't linted; exclude .venv and tracked .goal/ scratch (experiment .py files
          # that would false-block). (confidence-review 2026-07-01)
          files=$(git diff --name-only --diff-filter=d "$base...HEAD" -- '*.py' | grep -vE '(^|/)\.(venv|goal)/' || true)
          if [ -z "$files" ]; then echo "no Python changes"; exit 0; fi
          echo "$files" | xargs ruff check --select C901
      # Dead-code gate — vulture over the backend (currently zero findings at
      # conf>=80). `cls` is a classmethod-override signature arg, never dead code.
      - name: Dead code (vulture)
        run: |
          pip install vulture==2.14
          vulture caos/server caos/scripts --min-confidence 80 --ignore-names cls
      - run: pip install -r caos/server/requirements.txt pytest pytest-asyncio httpx
      # Engine type gate (mypy.ini: files=engine — the deterministic math core).
      # The gate had drifted RED unnoticed because nothing in CI ran it; wire it in
      # so a bad type in the engine can't merge. 3.11 leg only (mypy.ini pins 3.11).
      - name: Engine type gate (mypy)
        if: matrix.python-version == '3.11'
        run: |
          pip install mypy==2.1.0
          cd caos/server && mypy
      # Default suite on SQLite (the existing tests + async; Postgres-only tests
      # skipped). stress + cohort carry offline tests too (the mock-Anthropic wire
      # shape, the cohort-fetch predicates) — previously never collected anywhere,
      # so the stress mock could rot green (BE9-2).
      - run: python -m pytest caos/tests/server caos/tests/stress caos/tests/cohort -q
      # Guards the perf-smoke percentile math (the script runs against a live
      # deployment, not CI — see caos/tests/perf/smoke.py).
      - name: Perf smoke self-test
        run: python caos/tests/perf/smoke.py --selftest
      # Worker claim/lease tests against Postgres (SKIP LOCKED).
      - name: Worker tests (Postgres)
        env:
          DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/postgres
        run: python -m pytest caos/tests/server/test_async_runs.py -k "worker or reaper or claim" -q

  lock:
    name: Lock — requirements.lock in sync
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      # requirements.txt is the loose spec; requirements.lock is what the prod image
      # installs (pip install --require-hashes). Dependabot bumps only the .txt and the
      # rest of CI installs from the .txt, so a bumped floor or an added dep can silently
      # miss the lock and never reach prod (this shipped anthropic 0.112 vs a >=0.115.1
      # floor, and google-genai absent entirely). Fails when the lock doesn't satisfy
      # every requirements.txt spec. Deterministic — no regen/network (a regen+diff guard
      # is not reproducible: pip-compile bakes the input path + Python version into it).
      - run: pip install "packaging>=24"
      - run: python caos/scripts/check_lock_sync.py

  e2e:
    name: E2E — Playwright
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 26
          cache: npm
          cache-dependency-path: caos/frontend/package-lock.json
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: caos/server/requirements.txt
      - name: Install frontend deps
        working-directory: caos/frontend
        run: npm ci
      # Build the Next.js static export and stage it into caos/server/static,
      # so the FastAPI app serves the UI the tests drive.
      - name: Build static frontend
        run: bash caos/scripts/build_frontend.sh
      - name: Install server deps
        run: pip install -r caos/server/requirements.txt
      - name: Install Playwright browser
        working-directory: caos/frontend
        run: npx playwright install --with-deps chromium
      # No DATABASE_URL → SQLite; no model key → /api/chat uses demo fallback
      # (the research run test stubs /api/research, so a key isn't needed).
      - name: Start app server
        run: |
          nohup python caos/server/run.py > server.log 2>&1 &
          for i in $(seq 1 30); do
            curl -sf http://localhost:8000/api/health && exit 0
            sleep 1
          done
          echo "server did not become healthy"; cat server.log; exit 1
      - name: Run E2E
        working-directory: caos/frontend
        run: npm run test:e2e
      - name: Upload report on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: |
            caos/frontend/test-results
            server.log
          if-no-files-found: ignore

  image:
    name: Image — docker build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: docker/setup-buildx-action@v4
      # Gates the self-hosted deploy image: builds the Next.js export (stage 1)
      # and installs the server deps (stage 2). Build only — not pushed.
      - name: Build app image
        uses: docker/build-push-action@v7
        with:
          context: caos
          file: caos/deploy/Dockerfile
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-assets:
    name: Deploy — shell + compose lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      # Deploy assets were previously ungated — a broken backup.sh / compose
      # could merge unseen (e.g. the D5 backup-rotation bug). shellcheck is
      # preinstalled on ubuntu-latest; docker compose ships with the runner.
      - name: Shellcheck deploy scripts
        run: shellcheck caos/deploy/*.sh caos/scripts/*.sh
      # --no-interpolate: validate structure/schema without resolving the runtime
      # secrets (POSTGRES_PASSWORD etc.), which aren't present in CI (no .env).
      - name: Validate compose file
        run: docker compose -f caos/deploy/docker-compose.yml config -q --no-interpolate

  fallow:
    name: Fallow — new dead-code & duplication (PR gate)
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0 # full history so fallow can diff the PR against its base
      - uses: actions/setup-node@v6
        with:
          node-version: 26
      # Fails the PR only on dead code / duplication introduced by the diff.
      # JS/TS only; run from the repo root so .fallowrc.json (ignores the
      # design-sync dirs) is picked up.
      - run: npx --yes fallow dead-code --changed-since "origin/${{ github.base_ref }}" --ci
      - run: npx --yes fallow dupes --changed-since "origin/${{ github.base_ref }}" --ci

  corpus:
    name: Corpus — taxonomy consistency
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      # Stdlib-only drift check: each module_name must agree across schema filename,
      # ACTIVE_PROMPT, CP-X route graph, and the onboarding doc (Taxonomy A).
      - name: Module taxonomy drift check
        run: python3 "Modular OS/tools/check_module_consistency.py"

  security:
    name: Security — deps, SAST, secrets
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0 # full history so gitleaks scans past commits, not just the tree
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - uses: actions/setup-node@v6
        with:
          node-version: 26
          cache: npm
          cache-dependency-path: caos/frontend/package-lock.json
      # OSS-only gate — no paid SaaS (project policy: no-paid-services). Each
      # step below exits nonzero on a finding, failing the PR.
      - run: pip install pip-audit==2.7.3 bandit==1.7.10
      # Python deps vs live OSV data — authoritative, unlike an offline CVE table.
      - name: Dependency CVEs (pip-audit)
        run: pip-audit -r caos/server/requirements.txt
      # Python SAST — high severity, medium+ confidence. server/ + scripts/ only;
      # the test dirs live under caos/tests and are out of scope here.
      - name: Python SAST (bandit)
        run: bandit -r caos/server caos/scripts --severity-level high --confidence-level medium
      # Frontend deps straight from the lockfile — no install needed.
      - name: Frontend deps (npm audit)
        working-directory: caos/frontend
        run: npm audit --audit-level=high
      # Secret scan over the repo + history. OSS image (no GITLEAKS_LICENSE — that
      # is only required by the org-gated Action, which we deliberately avoid).
      # .gitleaks.toml allowlists prose/vendored trees that carry example tokens;
      # .gitleaksignore exempts specific verified-false-positive lines by fingerprint.
      - name: Secret scan (gitleaks)
        run: |
          docker run --rm -v "$PWD:/repo" ghcr.io/gitleaks/gitleaks:v8.18.4 \
            detect --source=/repo --config=/repo/.gitleaks.toml --redact --no-banner
