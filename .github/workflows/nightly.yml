# Nightly + on-demand regression sweep (PRE_DEPLOYMENT_QA_LOOPS.md §5).
#
# Daily: golden chain + concept/business contracts + the full hermetic backend.
# Weekly: a live-process 300-issuer load smoke against an isolated SQLite QA DB.
name: Nightly

on:
  schedule:
    - cron: "0 6 * * *" # 06:00 UTC daily
    - cron: "0 7 * * 0" # 07:00 UTC Sunday weekly load smoke
  workflow_dispatch:

permissions:
  contents: read

jobs:
  golden-e2e:
    name: Golden E2E — full chain, both lanes (L5)
    if: github.event_name != 'schedule' || github.event.schedule != '0 7 * * 0'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: caos/server/requirements.lock
      - name: Install server deps
        run: |
          pip install --require-hashes -r caos/server/requirements.lock
          pip install pytest pytest-asyncio httpx
      - name: Run the golden_e2e marker suite
        env:
          # Belt-and-braces: the conftest force-blanks these, but a scheduled
          # run must never be able to spend tokens even if that changes.
          ANTHROPIC_API_KEY: ""
          GEMINI_API_KEY: ""
          OPENROUTER_API_KEY: ""
        run: python -m pytest -m golden_e2e -q caos/tests/server/golden

  concept-contracts:
    name: Concepts — manifests, bindings, taxonomy
    if: github.event_name != 'schedule' || github.event.schedule != '0 7 * * 0'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: caos/server/requirements.lock
      - run: |
          pip install --require-hashes -r caos/server/requirements.lock
          pip install pytest pytest-asyncio httpx
      - name: Executable module and binding contracts
        run: >-
          python -m pytest -q
          caos/tests/server/test_module_manifests.py
          caos/tests/server/test_bindings.py
      - name: Prompt corpus taxonomy drift
        run: python "Modular OS/tools/check_module_consistency.py"

  full-server-regression:
    name: Backend — full hermetic regression
    if: github.event_name != 'schedule' || github.event.schedule != '0 7 * * 0'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: caos/server/requirements.lock
      - run: |
          pip install --require-hashes -r caos/server/requirements.lock
          pip install pytest pytest-asyncio httpx
      - name: Full server, cohort, and harness contracts
        env:
          ANTHROPIC_API_KEY: ""
          GEMINI_API_KEY: ""
          OPENROUTER_API_KEY: ""
        run: python -m pytest -q caos/tests/server caos/tests/cohort caos/tests/stress

  weekly-load-smoke:
    name: Weekly — isolated 300-issuer load smoke
    if: github.event_name == 'workflow_dispatch' || github.event.schedule == '0 7 * * 0'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: caos/server/requirements.lock
      - run: |
          pip install --require-hashes -r caos/server/requirements.lock
          pip install -r caos/tests/stress/requirements.txt
      - name: Start isolated keyless QA server
        env:
          DATABASE_URL: sqlite+aiosqlite:////tmp/caos-nightly.db
          CAOS_STORAGE_DIR: /tmp/caos-nightly-vault
          CAOS_DEMO_SEED: "false"
          HOST: 127.0.0.1
          PORT: "8010"
          ANTHROPIC_API_KEY: ""
          GEMINI_API_KEY: ""
          OPENROUTER_API_KEY: ""
        run: |
          nohup python caos/server/run.py > /tmp/caos-nightly-server.log 2>&1 &
          for i in $(seq 1 60); do
            curl -sf http://127.0.0.1:8010/api/health && exit 0
            sleep 1
          done
          cat /tmp/caos-nightly-server.log
          exit 1
      - name: Seed 300 unique issuers and five offline runs
        env:
          BASE_URL: http://127.0.0.1:8010
        run: python caos/tests/stress/seed_stress.py --issuers 300 --runs 5
      - name: Headless mixed-endpoint load (25 users, 60 seconds)
        run: >-
          locust -f caos/tests/stress/locustfile.py
          --host http://127.0.0.1:8010
          --headless --users 25 --spawn-rate 5 --run-time 60s
          --only-summary --exit-code-on-error 1
      - name: Upload server log on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: nightly-load-server-log
          path: /tmp/caos-nightly-server.log
