# clamd.conf — CAOS upload scanner (clamav/clamav image, av compose profile).
#
# Reason this file exists: clamd's default StreamMaxLength is 25 MB, but CAOS caps
# uploads at 250 MB (server config max_upload_mb). Without raising the limit, a
# 25–250 MB upload is streamed to clamd, rejected with "INSTREAM size limit
# exceeded", and the app fails the upload CLOSED (503). Raising the three size
# ceilings above the app cap lets large credit agreements / 10-Ks actually scan.
#
# Everything else mirrors the image defaults. Mounted read-only at
# /etc/clamav/clamd.conf by docker-compose.yml. A wrong value here only makes the
# scanner unavailable (uploads fail closed) — it can never weaken the scan.

# Run as the container's foreground process; timestamped scan log to stdout
# (docker compose logs clamav).
Foreground yes
LogTime yes

# Signature DB location (freshclam writes here; persisted via the clamav-data volume).
DatabaseDirectory /var/lib/clamav

# Local unix socket — REQUIRED. The clamav image entrypoint starts clamd then
# blocks until a socket file (/run/clamav/clamd.sock or /tmp/clamd.sock) appears,
# and exits 1 if it never does. A whole-file mount of this conf replaces the
# image default (which sets LocalSocket), so omitting it makes the container
# crash-loop on startup. /tmp matches the image default and is always writable.
LocalSocket /tmp/clamd.sock

# Accept INSTREAM scans over TCP from the app container on the internal network.
TCPSocket 3310
TCPAddr 0.0.0.0

# The fix: size ceilings above MAX_UPLOAD_MB (250M) so capped uploads scan.
StreamMaxLength 300M
MaxScanSize 300M
MaxFileSize 300M
