# CAOS — self-hosted Phase-1 stack (durable internal pilot).
#
#   Caddy (TLS, :443)  →  oauth2-proxy (auth)  →  app (FastAPI)  →  db (Postgres)
#
# The app is NOT published to the host — it is reachable only through
# oauth2-proxy, which authenticates the caller and injects the X-Forwarded-*
# identity headers identity.py trusts (SECURITY.md §1). Copy .env.example to
# .env and fill it in first.  Run:  docker compose up -d --build

name: caos

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    # Hardening: block privilege escalation + cap memory. Caps are NOT dropped and
    # read_only is unset — the postgres entrypoint starts as root, drops to the
    # postgres user, and writes its data/socket dirs.
    security_opt: ["no-new-privileges:true"]
    mem_limit: 1g
    environment:
      POSTGRES_USER: caos
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: caos
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U caos -d caos"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks: [internal]

  app:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    # Hardening: non-root already (Dockerfile USER caos). Drop all caps (the app
    # needs none), block priv-escalation, run an immutable rootfs. It writes only
    # to /vault (volume) and /tmp (upload tempfiles → tmpfs); PYTHONDONTWRITEBYTECODE
    # means no .pyc writes into the read-only /app.
    security_opt: ["no-new-privileges:true"]
    cap_drop: ["ALL"]
    read_only: true
    tmpfs: ["/tmp"]
    mem_limit: 2g
    environment:
      ENVIRONMENT: production
      HOST: 0.0.0.0
      PORT: "8000"
      # Durable Postgres + vault; demo seed OFF (registry starts empty).
      CAOS_DEMO_SEED: "false"
      DATABASE_URL: postgresql+asyncpg://caos:${POSTGRES_PASSWORD}@db:5432/caos
      CAOS_STORAGE_DIR: /vault
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      ANTHROPIC_MODEL: ${ANTHROPIC_MODEL:-claude-opus-4-8}
      EDGAR_USER_AGENT: ${EDGAR_USER_AGENT:-}
      MAX_UPLOAD_MB: ${MAX_UPLOAD_MB:-250}
      # Structure-preserving extraction via the markitdown CLI baked into the image
      # (Dockerfile). Empty = built-in pypdf/openpyxl fallback. Set in .env.
      CAOS_MARKITDOWN_CMD: ${CAOS_MARKITDOWN_CMD:-}
      # Defense-in-depth (SECURITY.md §1): require Caddy's injected edge secret so
      # forged X-Forwarded-* on a direct hit to app:8000 (e.g. a rogue container on
      # the internal net) is rejected. Empty = enforcement off (app logs a warning).
      EDGE_PROXY_SECRET: ${EDGE_PROXY_SECRET:-}
    volumes:
      - vault-data:/vault
    networks: [internal]
    # No `ports:` — the app must only be reachable via oauth2-proxy.

  oauth2-proxy:
    image: quay.io/oauth2-proxy/oauth2-proxy:v7.15.3
    restart: unless-stopped
    depends_on:
      app:
        condition: service_healthy
    # Hardening: stateless (sessions are client cookies), so drop all caps + run
    # an immutable rootfs with a tmpfs for any scratch writes.
    security_opt: ["no-new-privileges:true"]
    cap_drop: ["ALL"]
    read_only: true
    tmpfs: ["/tmp"]
    mem_limit: 256m
    command: ["--config=/etc/oauth2-proxy.cfg"]
    environment:
      OAUTH2_PROXY_CLIENT_ID: ${OAUTH2_PROXY_CLIENT_ID:?set in .env}
      OAUTH2_PROXY_CLIENT_SECRET: ${OAUTH2_PROXY_CLIENT_SECRET:?set in .env}
      OAUTH2_PROXY_COOKIE_SECRET: ${OAUTH2_PROXY_COOKIE_SECRET:?openssl rand -base64 32}
      OAUTH2_PROXY_REDIRECT_URL: https://${CAOS_DOMAIN:?set in .env}/oauth2/callback
      OAUTH2_PROXY_EMAIL_DOMAINS: ${CAOS_EMAIL_DOMAIN:?set in .env}
    volumes:
      - ./oauth2-proxy.cfg:/etc/oauth2-proxy.cfg:ro
    networks: [internal]

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    depends_on: [oauth2-proxy]
    # Hardening: drop all caps but keep NET_BIND_SERVICE (binds :80/:443) and block
    # priv-escalation. Not read_only — Caddy writes provisioned certs to /data.
    security_opt: ["no-new-privileges:true"]
    cap_drop: ["ALL"]
    cap_add: ["NET_BIND_SERVICE"]
    mem_limit: 256m
    ports:
      - "80:80"
      - "443:443"
    environment:
      CAOS_DOMAIN: ${CAOS_DOMAIN:?set in .env}
      # Edge secret injected toward the app (see Caddyfile). Empty = W1 off.
      EDGE_PROXY_SECRET: ${EDGE_PROXY_SECRET:-}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    networks: [internal]

  backup:
    # P7-1: daily pg_dump of Postgres + a tarball of the document vault, with
    # rotation, to the `backups` volume. On-host only — copy /backups off-host
    # (rsync / object storage) for real durability. Override cadence/retention
    # via BACKUP_INTERVAL_SECONDS / BACKUP_KEEP in .env.
    image: postgres:16-alpine
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    # Hardening: block priv-escalation + cap memory. Caps kept (pg_dump/tar) and
    # writable rootfs (writes /backups).
    security_opt: ["no-new-privileges:true"]
    mem_limit: 512m
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
      BACKUP_KEEP: ${BACKUP_KEEP:-7}
      BACKUP_INTERVAL_SECONDS: ${BACKUP_INTERVAL_SECONDS:-86400}
    entrypoint: ["/bin/sh", "/backup.sh"]
    volumes:
      - ./backup.sh:/backup.sh:ro
      - vault-data:/vault:ro
      - backups:/backups
    networks: [internal]

volumes:
  db-data:
  vault-data:
  caddy-data:
  caddy-config:
  backups:

networks:
  internal:
