# CAOS — self-hosted Phase-1 stack (durable internal pilot).
#
#   Caddy (TLS, :443)  →  oauth2-proxy (auth)  →  app (FastAPI)  →  db (Postgres)
#
# The app is NOT published to the host — it is reachable only through
# oauth2-proxy, which authenticates the caller and injects the X-Forwarded-*
# identity headers identity.py trusts (SECURITY.md §1). Copy .env.example to
# .env and fill it in first.  Run:  docker compose up -d --build

name: caos

services:
  db:
    # pgvector-enabled Postgres 18 (Debian-based; stock Postgres lacks the
    # `vector` extension that migration 0030's embeddings table needs).
    image: pgvector/pgvector:pg18@sha256:12a379b47ad65289572ea0756efc11b7c241a6662833e8af7038cd3b73d647e0
    restart: unless-stopped
    # Hardening: block privilege escalation + cap memory. Caps are NOT dropped and
    # read_only is unset — the postgres entrypoint starts as root, drops to the
    # postgres user, and writes its data/socket dirs.
    security_opt: ["no-new-privileges:true"]
    mem_limit: 1g
    environment:
      POSTGRES_USER: caos
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: caos
    volumes:
      # PG18 layout (audit 2026-07-10 DEP-1): the official 18+ images moved
      # PGDATA to /var/lib/postgresql/<major>/docker and declare their volume at
      # /var/lib/postgresql — mount the volume THERE. A mount at the pre-18
      # /var/lib/postgresql/data path is detected by the 18+ entrypoint as an
      # "unused mount/volume" and ABORTS the container: the stack never
      # completed a first boot as previously shipped. (pgvector:pg18 shares the
      # official image's entrypoint/layout.)
      - db-data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U caos -d caos"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks: [internal]

  app:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      clamav:
        condition: service_healthy
    # Hardening: non-root already (Dockerfile USER caos). Drop all caps (the app
    # needs none), block priv-escalation, run an immutable rootfs. It writes only
    # to /vault (volume) and /tmp (upload tempfiles → tmpfs); PYTHONDONTWRITEBYTECODE
    # means no .pyc writes into the read-only /app.
    security_opt: ["no-new-privileges:true"]
    cap_drop: ["ALL"]
    read_only: true
    tmpfs: ["/tmp:size=1g,mode=1777"]
    mem_limit: 4g
    environment:
      ENVIRONMENT: production
      HOST: 0.0.0.0
      PORT: "8000"
      # Uvicorn worker processes (E1). Unset/1 = today's single-process default.
      # Postgres-only — run.py refuses >1 against SQLite. Size against Postgres's
      # max_connections and load-test before raising (.env.example has the guidance).
      WEB_CONCURRENCY: ${WEB_CONCURRENCY:-1}
      # Per-worker Postgres pool. 0 derives 20 persistent + five overflow
      # connections, bounded by the supported two-worker/50-connection envelope.
      CAOS_DB_POOL_SIZE: ${CAOS_DB_POOL_SIZE:-0}
      CAOS_DB_MAX_OVERFLOW: ${CAOS_DB_MAX_OVERFLOW:-5}
      CAOS_DB_POOL_TIMEOUT_S: ${CAOS_DB_POOL_TIMEOUT_S:-30}
      # One 250 MiB upload/parser lane per process. At the supported maximum of
      # two workers this bounds live upload bodies to 500 MiB before parser copies.
      CAOS_UPLOAD_CONCURRENCY: ${CAOS_UPLOAD_CONCURRENCY:-1}
      # Durable Postgres + vault; demo seed OFF (registry starts empty).
      CAOS_DEMO_SEED: "false"
      DATABASE_URL: postgresql+asyncpg://caos:${POSTGRES_PASSWORD}@db:5432/caos
      CAOS_STORAGE_DIR: /vault
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      ANTHROPIC_MODEL: ${ANTHROPIC_MODEL:-claude-opus-4-8}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      OPENROUTER_BASE_URL: ${OPENROUTER_BASE_URL:-https://openrouter.ai/api/v1}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      MODEL_TIER_CHEAP: ${MODEL_TIER_CHEAP:-deepseek/deepseek-v4-flash}
      MODEL_TIER_FAST: ${MODEL_TIER_FAST:-deepseek/deepseek-v4-flash}
      MODEL_TIER_STRONG: ${MODEL_TIER_STRONG:-deepseek/deepseek-v4-pro}
      MODEL_TIER_TOP: ${MODEL_TIER_TOP:-claude-opus-4-8}
      # Provider keys alone never authorize confidential-document egress. An
      # operator must make this separate, explicit policy choice.
      CAOS_DOCUMENT_EGRESS_ENABLED: ${CAOS_DOCUMENT_EGRESS_ENABLED:-false}
      CAOS_LLM_TIMEOUT_S: ${CAOS_LLM_TIMEOUT_S:-120}
      RUN_TOKEN_BUDGET: ${RUN_TOKEN_BUDGET:-120000}
      SYNTH_CONCURRENCY: ${SYNTH_CONCURRENCY:-4}
      RERANK_ENABLED: ${RERANK_ENABLED:-false}
      RERANK_MODEL_TIER: ${RERANK_MODEL_TIER:-cheap}
      RERANK_WINDOW: ${RERANK_WINDOW:-20}
      COUNCIL_ENABLED: ${COUNCIL_ENABLED:-false}
      COUNCIL_SEATS: ${COUNCIL_SEATS:-4}
      COUNCIL_PEER_ROUND: ${COUNCIL_PEER_ROUND:-false}
      COUNCIL_CROSS_MODEL: ${COUNCIL_CROSS_MODEL:-false}
      COUNCIL_REVIEWER_MODEL_ANTHROPIC: ${COUNCIL_REVIEWER_MODEL_ANTHROPIC:-claude-sonnet-4-6}
      COUNCIL_REVIEWER_MODEL_GEMINI: ${COUNCIL_REVIEWER_MODEL_GEMINI:-gemini-2.5-flash}
      DEBATE_ENABLED: ${DEBATE_ENABLED:-false}
      ADVISOR_ENABLED: ${ADVISOR_ENABLED:-false}
      SYNTH_EXECUTOR_MODEL: ${SYNTH_EXECUTOR_MODEL:-claude-sonnet-4-6}
      ADVISOR_MODEL: ${ADVISOR_MODEL:-claude-opus-4-8}
      EDGAR_USER_AGENT: ${EDGAR_USER_AGENT:-}
      MAX_UPLOAD_MB: ${MAX_UPLOAD_MB:-250}
      # Mandatory production malware scanner. The app's production guard also
      # refuses to boot without this host; depends_on waits for signatures/clamd.
      CLAMAV_HOST: clamav
      CLAMAV_PORT: ${CLAMAV_PORT:-3310}
      # Total EDGAR throttle partitions across all replicas/processes. Must be at
      # least replica_count × WEB_CONCURRENCY; server also floors it at local W.
      CAOS_SEC_RATE_PARTITIONS: ${CAOS_SEC_RATE_PARTITIONS:-1}
      # Structure-preserving extraction via the markitdown CLI baked into the image
      # (Dockerfile). Empty = built-in pypdf/openpyxl fallback. Set in .env.
      CAOS_MARKITDOWN_CMD: ${CAOS_MARKITDOWN_CMD:-}
      # Applicable-updates gates are independently default-off. Do not enable a
      # downstream gate before its prerequisite observation window is green.
      CAOS_LINEAGE_V2_ENABLED: ${CAOS_LINEAGE_V2_ENABLED:-false}
      CAOS_MARKET_XLSX_V2_ENABLED: ${CAOS_MARKET_XLSX_V2_ENABLED:-false}
      CAOS_MODEL_ENGINE_V2_ENABLED: ${CAOS_MODEL_ENGINE_V2_ENABLED:-false}
      CAOS_CP_4D_ENABLED: ${CAOS_CP_4D_ENABLED:-false}
      CAOS_CP_2G_ENABLED: ${CAOS_CP_2G_ENABLED:-false}
      # Defense-in-depth (SECURITY.md §1): require Caddy's injected edge secret so
      # forged X-Forwarded-* on a direct hit to app:8000 (e.g. a rogue container on
      # the internal net) is rejected. REQUIRED — the app fails closed at boot in
      # production without it. Generate: python -c "import secrets;print(secrets.token_urlsafe(32))"
      EDGE_PROXY_SECRET: ${EDGE_PROXY_SECRET:?set in .env — the app fails closed in production without it}
      # App identity. Both have public in-source dev defaults, so the app fails
      # closed at boot under ENVIRONMENT=production unless real values are passed.
      # SESSION_SECRET signs the analyst cookie; ANALYST_SIGNUP_CODE gates profile
      # self-registration. Generate a secret: python -c "import secrets;print(secrets.token_urlsafe(32))"
      SESSION_SECRET: ${SESSION_SECRET:?set in .env}
      ANALYST_SIGNUP_CODE: ${ANALYST_SIGNUP_CODE:?set in .env}
    volumes:
      - vault-data:/vault
    networks: [internal]
    # No `ports:` — the app must only be reachable via oauth2-proxy.

  oauth2-proxy:
    image: quay.io/oauth2-proxy/oauth2-proxy:v7.15.3@sha256:10a1165743a192e1940b4708fb9647027185ce11a681a1c5519b442ff7f1f561
    restart: unless-stopped
    depends_on:
      app:
        condition: service_healthy
    # Hardening: stateless (sessions are client cookies), so drop all caps + run
    # an immutable rootfs with a tmpfs for any scratch writes.
    security_opt: ["no-new-privileges:true"]
    cap_drop: ["ALL"]
    read_only: true
    tmpfs: ["/tmp"]
    mem_limit: 256m
    command: ["--config=/etc/oauth2-proxy.cfg"]
    environment:
      OAUTH2_PROXY_CLIENT_ID: ${OAUTH2_PROXY_CLIENT_ID:?set in .env}
      OAUTH2_PROXY_CLIENT_SECRET: ${OAUTH2_PROXY_CLIENT_SECRET:?set in .env}
      OAUTH2_PROXY_COOKIE_SECRET: ${OAUTH2_PROXY_COOKIE_SECRET:?openssl rand -base64 32}
      OAUTH2_PROXY_REDIRECT_URL: https://${CAOS_DOMAIN:?set in .env}/oauth2/callback
      OAUTH2_PROXY_EMAIL_DOMAINS: ${CAOS_EMAIL_DOMAIN:?set in .env}
    volumes:
      - ./oauth2-proxy.cfg:/etc/oauth2-proxy.cfg:ro
    networks: [internal]

  caddy:
    image: caddy:2-alpine@sha256:5f5c8640aae01df9654968d946d8f1a56c497f1dd5c5cda4cf95ab7c14d58648
    restart: unless-stopped
    depends_on: [oauth2-proxy]
    # Hardening: drop all caps but keep NET_BIND_SERVICE (binds :80/:443) and block
    # priv-escalation. Not read_only — Caddy writes provisioned certs to /data.
    security_opt: ["no-new-privileges:true"]
    cap_drop: ["ALL"]
    cap_add: ["NET_BIND_SERVICE"]
    mem_limit: 256m
    ports:
      - "80:80"
      - "443:443"
    environment:
      CAOS_DOMAIN: ${CAOS_DOMAIN:?set in .env}
      MAX_UPLOAD_MB: ${MAX_UPLOAD_MB:-250}
      # Edge secret injected toward the app (see Caddyfile). Required — same value
      # the app validates; the app and this service both fail closed without it.
      EDGE_PROXY_SECRET: ${EDGE_PROXY_SECRET:?set in .env — injected by Caddy, validated by the app}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    networks: [internal]

  backup:
    # P7-1: daily pg_dump of Postgres + a tarball of the document vault, with
    # rotation, to the `backups` volume. A local scratch restore runs on schedule;
    # the isolated backup-sync service owns remote transfer and remote restores.
    build:
      context: ..
      dockerfile: deploy/Dockerfile.backup
    image: caos-backup:pg18
    user: "10001:10001"
    init: true
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    # Credential-free artifact producer. Only /backups is writable; remote
    # credentials live in the separate backup-sync service.
    security_opt: ["no-new-privileges:true"]
    cap_drop: ["ALL"]
    read_only: true
    tmpfs: ["/tmp:size=64m,mode=0700,uid=10001,gid=10001"]
    mem_limit: 512m
    pids_limit: 128
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
      BACKUP_KEEP: ${BACKUP_KEEP:-7}
      BACKUP_INTERVAL_SECONDS: ${BACKUP_INTERVAL_SECONDS:-86400}
      BACKUP_RESTORE_DRILL_EVERY: ${BACKUP_RESTORE_DRILL_EVERY:-7}
    volumes:
      - vault-data:/vault:ro
      - backups:/backups
    networks: [internal]
    healthcheck:
      test: ["CMD-SHELL", "test -f /backups/.caos-backup-ok && test ! -f /backups/.caos-backup-failed"]
      interval: 60s
      timeout: 5s
      retries: 5
      start_period: 300s

  backup-sync:
    # Remote credentials and tooling are isolated from artifact creation. The
    # local recovery set is read-only here; remote downloads land on a separate
    # scratch volume and are restored into a scratch database before health turns green.
    build:
      context: ..
      dockerfile: deploy/Dockerfile.backup-sync
    image: caos-backup-sync:pg18-rclone
    user: "10002:10002"
    # Shared recovery GID grants traversal/read of the producer-owned 0750
    # backup volume; the mount itself remains read-only and UIDs stay distinct.
    group_add: ["10000"]
    init: true
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      backup:
        condition: service_healthy
    security_opt: ["no-new-privileges:true"]
    cap_drop: ["ALL"]
    read_only: true
    tmpfs: ["/tmp:size=64m,mode=0700,uid=10002,gid=10002"]
    mem_limit: 512m
    pids_limit: 128
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
      BACKUP_REMOTE: ${BACKUP_REMOTE:?set the rclone remote path in .env}
      BACKUP_SYNC_INTERVAL_SECONDS: ${BACKUP_SYNC_INTERVAL_SECONDS:-86400}
      BACKUP_REMOTE_RESTORE_DRILL_EVERY: ${BACKUP_REMOTE_RESTORE_DRILL_EVERY:-7}
      RCLONE_CONFIG: /run/secrets/backup_rclone_config
    secrets: [backup_rclone_config]
    volumes:
      - backups:/backups:ro
      - backup-restore-cache:/restore
    networks: [internal]
    healthcheck:
      test: ["CMD-SHELL", "test -f /restore/.caos-backup-sync-ok && test ! -f /restore/.caos-backup-sync-failed"]
      interval: 60s
      timeout: 5s
      retries: 5
      start_period: 300s

  # Mandatory malware scanner for production uploads. Needs ~2 GB RAM and
  # downloads the virus DB on first boot (egress to database.clamav.net). The mounted
  # clamd.conf raises StreamMaxLength/MaxScanSize/MaxFileSize to 300M (above
  # MAX_UPLOAD_MB=250) so large credit agreements / 10-Ks scan instead of failing
  # closed (503) on clamd's 25 MB default. Verify clamd starts on the first av deploy.
  clamav:
    image: clamav/clamav:1.5@sha256:7f5389ccaa2368c383fa80e167ccfe44348d71e685f926fce4755eed1757673a
    restart: unless-stopped
    security_opt: ["no-new-privileges:true"]
    mem_limit: 2g
    volumes:
      - clamav-data:/var/lib/clamav              # persist the downloaded virus DB across restarts
      - ./clamd.conf:/etc/clamav/clamd.conf:ro   # raise size limits above MAX_UPLOAD_MB (else large uploads 503)
    healthcheck:
      test: ["CMD", "clamdcheck.sh"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s   # first boot downloads the signature DB
    networks: [internal]

volumes:
  db-data:
  vault-data:
  caddy-data:
  caddy-config:
  backups:
  backup-restore-cache:
  clamav-data:

secrets:
  backup_rclone_config:
    file: ${BACKUP_RCLONE_CONFIG_FILE:?set the path to a secret rclone config}

networks:
  internal:
