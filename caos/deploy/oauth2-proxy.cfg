# oauth2-proxy — authenticates the caller (Google Workspace OIDC) and reverse-
# proxies authenticated requests to the app, injecting the identity headers
# identity.py reads. Secrets, redirect_url and email_domains come from the
# environment (see docker-compose.yml / .env).

http_address = "0.0.0.0:4180"

# Act as the reverse proxy in front of the app, and trust the X-Forwarded-*
# set by Caddy (the only hop in front of us) when building redirect URLs.
reverse_proxy = true
upstreams = ["http://app:8000/"]

provider = "google"
skip_provider_button = true

# Inject the authenticated identity to the upstream as the exact headers
# identity.py trusts: X-Forwarded-User / -Email / -Preferred-Username.
pass_user_headers = true
pass_access_token = false
set_xauthrequest = false

# Session cookie hardening.
cookie_secure = true
cookie_httponly = true
cookie_samesite = "lax"
cookie_expire = "168h"

# Auth-feed logging (threat-detection): emit OAuth authentication attempts and
# per-request lines to stdout (`docker compose logs oauth2-proxy`). auth_logging
# carries the success/failure + client IP + email that the AUTH hunt scores —
# 401/failure spike by IP = brute (T1110), off-hours success by email = account
# abuse (T1078). These default to true; pinned explicitly so the feed can't be
# silently lost to a default change on an upgrade.
auth_logging = true
request_logging = true
standard_logging = true
