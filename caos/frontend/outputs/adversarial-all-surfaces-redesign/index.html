<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>CAOS · Remaining surface redesign studies</title>
  <style>
    :root {
      color-scheme: dark;
      --bg:#0a0a0f;--panel:#11131d;--elev:#1d2030;--border:#34384a;
      --text:#e6e6ef;--muted:#a1a1b5;--accent:#63a1ff;--warn:#f5a524;
      --critical:#ef4444;--success:#22c55e;--teal:#2dd4bf;--purple:#c4b5fd;
      --paper:#f7f5ee;--ink:#16161e;
    }
    *{box-sizing:border-box} html,body{margin:0;min-height:100%;background:var(--bg);color:var(--text)}
    body{font-family:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;overflow:hidden}
    button,input{font:inherit}.mono,.label,.chip,.num,.row,.table,.rail{font-family:"JetBrains Mono",ui-monospace,SFMono-Regular,Menlo,monospace;font-variant-numeric:tabular-nums}
    .app{height:100vh;display:grid;grid-template-columns:214px minmax(0,1fr);background:var(--bg)}
    .rail{display:flex;flex-direction:column;min-height:0;border-right:1px solid var(--border);background:#0e1018;padding:18px 12px 12px}
    .brand{font-weight:800;letter-spacing:.24em;font-size:14px;padding:0 9px 17px}.brand b{color:var(--accent)}
    .nav-group{margin:11px 0 3px;padding:0 9px;color:#73778c;text-transform:uppercase;font-size:8px;letter-spacing:.22em}
    .nav{min-height:30px;display:flex;align-items:center;gap:8px;padding:6px 9px;margin:1px 0;border:1px solid transparent;border-radius:6px;color:var(--muted);font-size:10px}
    .nav.active{color:var(--text);border-color:#3f5680;background:#18243a}.nav .glyph{width:14px;text-align:center;color:#788096}.nav.active .glyph{color:var(--accent)}
    .rail-foot{margin-top:auto;border-top:1px solid var(--border);padding:12px 8px 0;color:var(--muted);font-size:8px;line-height:1.6}.rail-foot strong{color:var(--text);font-weight:600}
    .page{min-width:0;display:flex;flex-direction:column;height:100vh;overflow:hidden}
    .top{min-height:54px;display:flex;align-items:center;gap:10px;padding:8px 14px;border-bottom:1px solid var(--border);background:#0d0f17}
    .stage{color:var(--accent);font:600 9px/1 "JetBrains Mono",monospace;letter-spacing:.13em;text-transform:uppercase;white-space:nowrap}
    .title{font-size:17px;font-weight:650;white-space:nowrap}.sub{min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--muted);font-size:10px}
    .spacer{flex:1}.view{display:flex;border:1px solid var(--border);border-radius:6px;overflow:hidden}.view span{padding:5px 8px;color:var(--muted);font:500 8px/1 "JetBrains Mono",monospace;text-transform:uppercase}.view span:first-child{background:#1d2942;color:#a9c9ff}
    .origin{display:flex;align-items:center;gap:5px;border:1px solid #2f6a4b;border-radius:5px;padding:4px 7px;color:#75d39a;font:600 8px/1 "JetBrains Mono",monospace;white-space:nowrap}.origin::before{content:"●";font-size:7px}
    .primary{border:1px solid var(--accent);border-radius:6px;background:var(--accent);color:#08101e;padding:7px 11px;font:700 9px/1 "JetBrains Mono",monospace;letter-spacing:.06em;text-transform:uppercase;white-space:nowrap}
    .decision{display:grid;grid-template-columns:1.05fr 1fr 1fr .85fr;border-bottom:1px solid var(--border);background:#0b1019;min-height:66px}
    .dcell{min-width:0;padding:10px 13px;border-right:1px solid var(--border)}.dcell:last-child{border-right:0}
    .label{display:block;color:#777d91;font-size:8px;letter-spacing:.18em;text-transform:uppercase;margin-bottom:6px}.dvalue{font:500 11px/1.35 "JetBrains Mono",monospace;color:var(--text);white-space:normal}.dvalue.good{color:#8bddac}.dvalue.warn{color:#f6c46c}
    .toolbar{min-height:47px;display:flex;align-items:center;gap:10px;padding:8px 12px;border-bottom:1px solid var(--border);background:#10131d}
    .toolbar .tool-title{font-size:12px;font-weight:650}.count{color:var(--muted);font:500 9px "JetBrains Mono",monospace}.search{margin-left:auto;width:230px;border:1px solid var(--border);border-radius:6px;background:var(--bg);color:var(--muted);padding:6px 9px;font:500 9px "JetBrains Mono",monospace}.softbtn{border:1px solid var(--border);border-radius:6px;background:transparent;color:var(--muted);padding:6px 9px;font:600 8px/1 "JetBrains Mono",monospace;text-transform:uppercase}
    .workspace{min-height:0;flex:1;display:grid;gap:8px;padding:8px;overflow:hidden}.workspace.cols{grid-template-columns:230px minmax(0,1fr) 310px}.workspace.wide{grid-template-columns:minmax(0,1fr) 330px}.workspace.editor{grid-template-columns:minmax(0,1fr) 296px}.workspace.paper-layout{grid-template-columns:205px minmax(440px,1fr) 300px}.workspace.ask-layout{grid-template-columns:minmax(0,1fr)}
    .panel{min-width:0;min-height:0;display:flex;flex-direction:column;border:1px solid var(--border);border-radius:7px;background:var(--panel);overflow:hidden}.phead{height:34px;display:flex;align-items:center;gap:8px;padding:0 11px;border-bottom:1px solid var(--border);font:600 8px/1 "JetBrains Mono",monospace;letter-spacing:.15em;text-transform:uppercase;color:#b6bacb}.phead .meta{margin-left:auto;color:#72788a;letter-spacing:.05em}.pbody{min-height:0;flex:1;overflow:hidden;padding:10px}
    .list{display:flex;flex-direction:column}.item{display:grid;grid-template-columns:22px minmax(0,1fr) auto;align-items:center;gap:7px;min-height:40px;padding:6px 4px;border-bottom:1px solid #282c3b}.item.selected{background:#182238}.idx{color:#70768a;text-align:center;font:600 9px "JetBrains Mono",monospace}.name{font-size:10px;font-weight:600}.meta2{color:var(--muted);font:500 8px/1.35 "JetBrains Mono",monospace;margin-top:3px}.badge{border:1px solid var(--border);border-radius:4px;padding:3px 5px;font:600 7px/1 "JetBrains Mono",monospace;text-transform:uppercase;color:var(--muted)}.badge.live{border-color:#2f6a4b;color:#67d292}.badge.warn{border-color:#745522;color:#f3b958}.badge.blue{border-color:#31598f;color:#79abf7}.badge.crit{border-color:#75363d;color:#f5858a}.dot{width:7px;height:7px;border-radius:50%;background:var(--accent);display:inline-block}.dot.teal{background:var(--teal)}.dot.warn{background:var(--warn)}.dot.crit{background:var(--critical)}
    .table{width:100%;border-collapse:collapse;font-size:9px}.table th{text-align:left;color:#7f8497;font-size:7px;text-transform:uppercase;letter-spacing:.12em;padding:7px 8px;border-bottom:1px solid var(--border);font-weight:600}.table td{padding:9px 8px;border-bottom:1px solid #272b3a;color:#c8cad7;white-space:nowrap}.table tr.selected td{background:#182238;color:var(--text)}.table .right{text-align:right}.table .accent{color:#84b2fb}.table .warn{color:#f6c46c}.table .good{color:#78d598}.check{width:13px;height:13px;border:1px solid #697087;border-radius:3px;display:inline-grid;place-items:center;color:var(--accent)}
    .summary{display:grid;grid-template-columns:repeat(3,1fr);border-bottom:1px solid var(--border)}.metric{padding:11px;border-right:1px solid var(--border)}.metric:last-child{border:0}.metric strong{display:block;font:650 15px/1.1 "JetBrains Mono",monospace}.metric span{font:500 7px "JetBrains Mono",monospace;color:var(--muted);text-transform:uppercase;letter-spacing:.11em}
    .callout{border:1px solid #40557b;border-radius:6px;background:#121a2a;padding:10px;margin-bottom:9px}.callout h3{font-size:11px;margin:0 0 5px}.callout p{font-size:9px;line-height:1.45;color:var(--muted);margin:0}.actions{display:flex;gap:7px;margin-top:10px}.actions button{border:1px solid var(--border);border-radius:5px;background:transparent;color:var(--muted);padding:6px 8px;font:600 8px "JetBrains Mono",monospace}.actions .selected-action{background:var(--accent);border-color:var(--accent);color:#07101d}
    .provenance{display:flex;gap:5px;flex-wrap:wrap;padding:8px 0;border-bottom:1px solid #292d3b}.quote{margin:13px 0;padding:12px;border:1px solid var(--border);background:#0d0f16;color:#d8d9e4;font:500 12px/1.55 "JetBrains Mono",monospace}.source{padding:8px 0;border-bottom:1px solid #292d3b}.source strong{font-size:9px}.source div{font:500 8px/1.35 "JetBrains Mono",monospace;color:var(--muted);margin-top:3px}
    .drop{height:150px;border:1px dashed #4a5065;border-radius:7px;background:#0c0e15;display:grid;place-items:center;text-align:center;color:var(--muted);font:500 10px/1.6 "JetBrains Mono",monospace}.drop b{color:var(--text)}.steps{margin-top:10px}.step{display:grid;grid-template-columns:22px minmax(0,1fr) auto;gap:8px;align-items:center;padding:9px 4px;border-bottom:1px solid #292d3b;font:500 9px "JetBrains Mono",monospace}.step .n{display:grid;place-items:center;width:18px;height:18px;border:1px solid var(--border);border-radius:50%;color:var(--muted)}.step.done .n{background:#153423;border-color:#2f6a4b;color:#79d79b}
    .paper-wrap{background:#090a0f;padding:14px;overflow:auto}.paper{width:min(690px,100%);min-height:720px;margin:0 auto;background:var(--paper);color:var(--ink);padding:34px 42px;box-shadow:0 16px 32px -24px #000}.paper .mast{font:700 18px/1.2 "JetBrains Mono",monospace;letter-spacing:.09em;border-bottom:3px solid var(--ink);padding-bottom:9px}.paper .auth{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;padding:12px 0;border-bottom:1px solid #b7b2a6;font:700 8px/1.45 "JetBrains Mono",monospace;text-transform:uppercase}.paper h2{font-size:15px;margin:24px 0 9px}.paper p{font-size:10px;line-height:1.58;color:#363640}.paper table{width:100%;border-collapse:collapse;font:500 9px "JetBrains Mono",monospace}.paper td{padding:7px 4px;border-bottom:1px solid #cbc6ba}.paper td:last-child{text-align:right;font-weight:700}
    .sheet{overflow:auto;background:#0b0d13}.formula{height:35px;display:flex;align-items:center;gap:8px;padding:0 9px;border-bottom:1px solid var(--border);font:500 9px "JetBrains Mono",monospace}.fx{color:var(--accent);font-weight:700}.grid{display:grid;grid-template-columns:150px repeat(5,minmax(90px,1fr));min-width:650px;font:500 9px "JetBrains Mono",monospace}.cell{min-height:29px;padding:7px 8px;border-right:1px solid #292d3b;border-bottom:1px solid #292d3b;text-align:right}.cell.h{background:#151824;color:#8d93a6;font-size:8px}.cell.rowh{text-align:left;color:#c8cad7}.cell.sel{outline:2px solid var(--accent);outline-offset:-2px;background:#182238}.cell.ov{color:#f6c46c}.cell.reported::after{content:" R";font-size:6px;color:#6fcf95}
    .dag{position:relative;height:100%;min-height:410px;background:#0b0d14}.lane{position:absolute;left:14px;right:14px;height:72px;border-top:1px solid #242837;color:#6f7588;font:600 7px "JetBrains Mono",monospace;padding-top:5px;text-transform:uppercase}.node{position:absolute;width:120px;border:1px solid var(--border);border-radius:6px;background:#151824;padding:8px;font:600 8px/1.4 "JetBrains Mono",monospace}.node.done{border-color:#2f6a4b}.node.run{border-color:#31598f;background:#132038}.node.block{border-color:#704044;background:#241216}.edge{position:absolute;height:1px;background:#43516f;transform-origin:left center}
    .chart{height:105px;display:flex;align-items:flex-end;gap:8px;padding:15px 10px 8px;border-bottom:1px solid #292d3b}.bar{flex:1;min-width:12px;background:#31598f;border-radius:2px 2px 0 0}.bar.teal{background:#267f79}.bar.warn{background:#946a26}.chartlabels{display:flex;gap:8px;padding:4px 10px}.chartlabels span{flex:1;text-align:center;color:#73798c;font:500 7px "JetBrains Mono",monospace}
    .settings-row{display:grid;grid-template-columns:minmax(150px,1fr) 210px;align-items:center;gap:12px;padding:10px 2px;border-bottom:1px solid #292d3b}.settings-row strong{font-size:9px}.settings-row p{font-size:8px;color:var(--muted);margin:3px 0 0}.control{border:1px solid var(--border);border-radius:5px;background:#0b0d14;padding:7px 9px;color:#d3d5df;font:500 8px "JetBrains Mono",monospace}.audit{padding:7px 0;border-bottom:1px solid #292d3b;font:500 8px/1.4 "JetBrains Mono",monospace}.audit time{color:var(--muted)}
    .composer{max-width:1050px;width:100%;margin:28px auto 0}.scope{display:flex;gap:6px;margin-bottom:8px}.scope span{border:1px solid var(--border);border-radius:5px;padding:5px 7px;font:600 8px "JetBrains Mono",monospace;color:var(--muted)}.scope span.on{border-color:#31598f;color:#8cb8fb;background:#14213a}.askbox{display:flex;border:1px solid #4b628c;border-radius:8px;background:#111521;padding:8px}.askinput{flex:1;color:var(--text);font:500 12px "JetBrains Mono",monospace;padding:8px}.askrun{background:var(--accent);color:#08101e;border-radius:5px;padding:8px 12px;font:700 9px "JetBrains Mono",monospace}.answer{margin-top:12px;display:grid;grid-template-columns:minmax(0,1fr) 295px;gap:8px}.answer-main,.answer-side{border:1px solid var(--border);border-radius:7px;background:var(--panel);padding:13px}.answer-main h2{font-size:13px;margin:0 0 8px}.answer-main p{font-size:10px;color:#c2c5d3;line-height:1.55}.handoff{display:flex;justify-content:space-between;align-items:center;border-top:1px solid var(--border);padding-top:10px;margin-top:12px;color:var(--muted);font:500 8px "JetBrains Mono",monospace}
    .final{min-height:43px;display:flex;align-items:center;gap:8px;padding:6px 12px;border-top:1px solid var(--border);background:#0f121b}.final .note{color:var(--muted);font:500 8px "JetBrains Mono",monospace}.final .spacer{flex:1}.annotation{border:1px solid #40557b;color:#8fb8f5;background:#121a2a;border-radius:5px;padding:5px 7px;font:600 7px "JetBrains Mono",monospace;text-transform:uppercase;letter-spacing:.08em}
    @media(max-width:1050px){.app{grid-template-columns:1fr}.rail{display:none}.workspace.cols,.workspace.paper-layout{grid-template-columns:210px minmax(0,1fr)}.workspace.cols>.panel:last-child,.workspace.paper-layout>.panel:last-child{display:none}.decision{grid-template-columns:1fr 1fr}.dcell:nth-child(n+3){display:none}.sub{display:none}}
  </style>
</head>
<body><div id="root"></div>
<script>
const navGroups=[['INTAKE',[['issuers','Directory'],['upload','Upload']]],['ANALYZE',[['research','Research'],['query','Query'],['sector','Sector Review'],['rv','RV Screener'],['sponsors','Sponsors']]],['DECIDE',[['command','Command Center'],['deepdive','Deep-Dive'],['model','Model Builder']]],['PUBLISH',[['reports','Report Studio']]],['MONITOR',[['pipeline','Pipeline'],['monitor','Alert Monitor']]]];
const surfaces={
  issuers:{order:'01',stage:'Intake',title:'Issuer Directory',subtitle:'Coverage universe · ownership · readiness',primary:'Add issuer',status:'LIVE REGISTRY',active:'issuers',toolbar:'Coverage worklist',count:'382 issuers · 41 stale',search:'Search issuer, ticker, FIGI…',decision:['12 coverage gaps','4 names stale >30d','Assign owners before refresh','94% source-complete'],kind:'cols',left:'Saved coverage views',main:'Coverage · issuer register',right:'Issuer preview · selected row',body:'issuers',footer:'Selection persists into Upload, Deep-Dive and Command'},
  upload:{order:'02',stage:'Intake',title:'Document Intake',subtitle:'Issuer → authority → documents → run',primary:'Ingest documents',status:'CP-0 LIVE',active:'upload',toolbar:'Intake batch',count:'3 documents staged',search:'Add source URL or document…',decision:['3 documents staged','1 scanned PDF needs OCR','Choose OCR route or exclude file','2 reported · 1 unknown'],kind:'wide',main:'Staged documents · Altice France',right:'Preflight & ingestion lane',body:'upload',footer:'Authority is declared once here and follows every downstream claim'},
  research:{order:'03',stage:'Analyze',title:'Research',subtitle:'Decision-bound external research with durable jobs',primary:'Run research',status:'LIVE JOB',active:'research',toolbar:'Research workbench',count:'Brief v7 · saved',search:'Find saved brief…',decision:['Q2 refinancing evidence changed','Issuer rebuttal due before IC','Run targeted evidence refresh','6/8 sources current'],kind:'cols',left:'Brief & saved investigations',main:'Research report · working draft',right:'Source ledger · claims',body:'research',footer:'A report is not a finding until the analyst pins or ratifies a claim'},
  sponsors:{order:'04',stage:'Analyze',title:'Sponsor Track Records',subtitle:'Behavioural history across owned credits',primary:'Review selected sponsor',status:'LIVE PROFILE',active:'sponsors',toolbar:'Sponsor universe',count:'47 sponsors · 9 flagged',search:'Search sponsor or issuer…',decision:['2 new dividend recaps','Read-through to 6 held names','Review Apollo pattern','38/47 evidence-complete'],kind:'cols',left:'Saved sponsor screens',main:'Sponsor ledger · behaviour and outcomes',right:'Sponsor dossier · Apollo',body:'sponsors',footer:'Track record events cite the underlying credit, source and outcome'},
  command:{order:'05',stage:'Decide',title:'Command Center',subtitle:'PM ten-second answer · portfolio posture · governance',primary:'Review top change',status:'OBSERVED 07:45',active:'command',toolbar:'Ranked portfolio changes',count:'8 required actions',search:'Filter book or owner…',decision:['3 repricings · 1 gate fail','2.1% NAV in widening names','Review Altice thesis today','94% current · 2 stale'],kind:'wide',main:'Ranked changes · severity × position size',right:'Posture & governance queues',body:'command',footer:'Only ratified findings enter the PM ranking'},
  deepdive:{order:'06',stage:'Decide',title:'Deep-Dive · Altice France',subtitle:'One issuer view · one version · evidence-synced modules',primary:'Affirm view',status:'RUN R-4821',active:'deepdive',toolbar:'Issuer decision workbench',count:'19 modules · 3 open findings',search:'⌘M find module…',decision:['CP-3B recovery −6pts','2L thesis weakens under DOWN','Revise downside sizing','18/19 modules current'],kind:'cols',left:'Modules · pinned and recent',main:'Credit view · conclusion first',right:'Evidence Atlas · selected claim',body:'deepdive',footer:'Affirming creates a versioned thesis event; it never edits prior evidence'},
  model:{order:'07',stage:'Decide',title:'Model Builder · Altice France',subtitle:'Full-screen financial model · saved version 14',primary:'Save & re-run',status:'MODELLED · DRAFT',active:'model',toolbar:'Operating model',count:'FY25A–FY29E · 7 overrides',search:'Name box / formula…',decision:['DOWN case FCF turns negative','Revenue −4% breaches min cash','Review liquidity assumptions','Actuals current · forecasts draft'],kind:'editor',main:'Financial model · editable grid',right:'Scenario & evidence inspector',body:'model',footer:'Save creates a checkpoint; re-run records dependency and formula changes'},
  reports:{order:'08',stage:'Publish',title:'Report Studio · Altice France',subtitle:'Committee document · claim-linked and print-ready',primary:'Export committee PDF',status:'QA 2 OPEN',active:'reports',toolbar:'Report composition',count:'9 sections · 2 unresolved claims',search:'Find section or claim…',decision:['Model v14 changed leverage','Two pages require re-ratification','Resolve claims before export','41/43 claims current'],kind:'paper-layout',left:'Document outline',main:'Committee paper · live preview',right:'Claim lineage & preflight',body:'reports',footer:'Export is blocked until authority, QA and document hash are valid'},
  pipeline:{order:'09',stage:'Monitor',title:'Pipeline · Run R-4821',subtitle:'Execution, clearance and recovery',primary:'Resolve blocked step',status:'PARTIAL · 18/21',active:'pipeline',toolbar:'Run operations',count:'1 blocked · 2 pending',search:'Find module or event…',decision:['CP-5 gate blocked publish','Missing CP-3B recovery source','Route source gap to owner','18/21 outputs current'],kind:'wide',main:'Execution DAG · live run',right:'Selected step · recovery',body:'pipeline',footer:'The last good artifact remains available while a retry runs'},
  monitor:{order:'10',stage:'Monitor',title:'Alert Monitor',subtitle:'Event → impact → owner → action → resolution',primary:'Acknowledge top alert',status:'5 LIVE EVENTS',active:'monitor',toolbar:'Alert inbox',count:'5 new · 1 unassigned',search:'Filter event, issuer or owner…',decision:['5 events overnight','€96m capacity at risk','Assign EG basket alert','4/5 source-backed'],kind:'wide',main:'Alert inbox · ranked by portfolio impact',right:'Selected alert · evidence and action',body:'monitor',footer:'Phone shows this same triage contract without modeling or authoring'},
  settings:{order:'11',stage:'Utility',title:'Settings',subtitle:'Analyst preferences · workspace policy · audit history',primary:'Save changes',status:'SERVER PROFILE',active:'settings',toolbar:'Workspace configuration',count:'3 unsaved changes',search:'Find a setting…',decision:['Research model changed','Affects future jobs only','Review cost and governance impact','Server sync healthy'],kind:'cols',left:'Settings sections',main:'Models & routing',right:'Impact preview · audit trail',body:'settings',footer:'Every setting states storage scope, effect timing and permission source'},
  profile:{order:'12',stage:'Context',title:'Issuer Profile · Altice France',subtitle:'Persistent issuer context · overlay, not workflow route',primary:'Open Deep-Dive',status:'OBSERVED 07:42',active:'issuers',toolbar:'Issuer dossier',count:'4 active findings · 2 alerts',search:'Find metric, source or event…',decision:['DM +38bps w/w','2L recovery −6pts','Review sizing today','27/29 claims current'],kind:'cols',left:'Profile sections',main:'Ten-second answer & trends',right:'Evidence & downstream consumers',body:'profile',footer:'The profile follows the selected issuer without replacing the active workflow'},
  ask:{order:'13',stage:'Global verb',title:'Ask CAOS',subtitle:'Thin universal launcher · complex work opens in Query',primary:'Run question',status:'CONTEXT LOCKED',active:'ask',toolbar:'',count:'',search:'',decision:['Issuer: Altice France','Sector: Cable / Telecom','Run: R-4821','Sources: current'],kind:'ask-layout',main:'',body:'ask',footer:'ASK preserves the page; Query owns persisted investigations and advanced views'}
};
const chip=(text,cls='')=>`<span class="badge ${cls}">${text}</span>`;
const item=(i,name,meta,badge='',selected=false)=>`<div class="item ${selected?'selected':''}"><span class="idx">${i}</span><div><div class="name">${name}</div><div class="meta2">${meta}</div></div>${badge}</div>`;
const panel=(title,body,meta='')=>`<section class="panel"><div class="phead">${title}${meta?`<span class="meta">${meta}</span>`:''}</div><div class="pbody">${body}</div></section>`;
function rail(active){return `<aside class="rail"><div class="brand"><b>C</b>AOS</div>${navGroups.map(([g,items])=>`<div class="nav-group">${g}</div>${items.map(([k,l])=>`<div class="nav ${active===k?'active':''}"><span class="glyph">${active===k?'◆':'◇'}</span>${l}</div>`).join('')}`).join('')}<div class="rail-foot"><strong>View: Analyst</strong><br/>Presentation only · permissions unchanged<br/><br/>⌘K palette · Alt+K Ask</div></aside>`}
function decision(vals){return `<div class="decision">${['What changed','Why it matters','Required action','Evidence health'].map((l,i)=>`<div class="dcell"><span class="label">${l}</span><div class="dvalue ${i===2?'warn':i===3?'good':''}">${vals[i]}</div></div>`).join('')}</div>`}
function navList(lines){return lines.map((x,i)=>item(String(i+1).padStart(2,'0'),x[0],x[1],x[2]||'',i===0)).join('')}
