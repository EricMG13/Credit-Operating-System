# Alembic config for the CAOS server.
#
# The database URL is NOT set here — env.py reads it from the app settings
# (config.get_settings().database_url) so the CLI and the programmatic
# on-boot upgrade always target the same database (SQLite in dev, Lakebase in
# prod). Run migrations with:  alembic upgrade head   (from caos/server).

[alembic]
script_location = migrations
prepend_sys_path = .

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
