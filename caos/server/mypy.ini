# Static type gate for the analytical engine and API route layer, where a wrong
# type can corrupt committee output or turn a nullable/foreign database row into
# a faulty response. Run from caos/server in the py3.11 venv:
#
#     .venv311/bin/mypy
#
# The engine and routes are both clean under the pinned CI toolchain. Database
# model internals remain import-followed for type information without becoming a
# separately reported target.
#
# The nine dict-heavy synthesizers below are excluded: they shape untyped
# chunk/scan dicts and are dynamic by design. Annotating them is a deferred
# follow-up (a typed-dataclass pass over the scan layer), not a bug. Drop a
# module from this list once it is typed.

[mypy]
python_version = 3.11
ignore_missing_imports = True
# Follow imported modules for type information without separately reporting
# modules outside the configured engine/ and routes/ surfaces.
follow_imports = silent
files = engine, routes

[mypy-engine.adjusted]
ignore_errors = True

[mypy-engine.council]
ignore_errors = True

[mypy-engine.covenants]
ignore_errors = True

[mypy-engine.edgar_cp1]
ignore_errors = True

[mypy-engine.reported_cp1]
ignore_errors = True

[mypy-engine.peers]
ignore_errors = True

[mypy-engine.planner]
ignore_errors = True

[mypy-engine.querygraph]
ignore_errors = True

[mypy-engine.synth]
ignore_errors = True
