# Static type gate for the analytical engine — the deterministic core where a
# wrong type is a correctness risk (schemas, the CP-5 gate, the CP-X math
# modules). Run from caos/server in the py3.11 venv:
#
#     .venv311/bin/mypy
#
# Scoped to engine/ on purpose: the FastAPI I/O layer (routes/, database.py) is
# covered by the 377-test suite, while the engine is where a bad type silently
# corrupts a number an investment committee sees. The gate is green today and
# catches NEW type errors in the typed modules.
#
# The nine dict-heavy synthesizers below are excluded: they shape untyped
# chunk/scan dicts and are dynamic by design. Annotating them is a deferred
# follow-up (a typed-dataclass pass over the scan layer), not a bug. Drop a
# module from this list once it is typed.

[mypy]
python_version = 3.11
ignore_missing_imports = True
# Check engine/ only; still follow imports into routes/database for type info but
# don't report errors there (that layer is test-covered, and sqlalchemy's typed
# Result lacks .rowcount in stubs — noise, not a bug).
follow_imports = silent
files = engine

[mypy-engine.adjusted]
ignore_errors = True

[mypy-engine.council]
ignore_errors = True

[mypy-engine.covenants]
ignore_errors = True

[mypy-engine.edgar_cp1]
ignore_errors = True

[mypy-engine.reported_cp1]
ignore_errors = True

[mypy-engine.peers]
ignore_errors = True

[mypy-engine.planner]
ignore_errors = True

[mypy-engine.querygraph]
ignore_errors = True

[mypy-engine.synth]
ignore_errors = True
