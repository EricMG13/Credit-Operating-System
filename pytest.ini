# Repo-wide pytest config. First registry of custom markers — pytest warns on
# (and --strict-markers would reject) unregistered marks, and the loop doc's
# nightly workflow selects suites by marker (PRE_DEPLOYMENT_QA_LOOPS.md §5).
[pytest]
markers =
    golden_e2e: full-chain golden E2E (issuer -> CP-1 lane -> 19-module DAG -> CP-5 gate); nightly selects with -m golden_e2e
    corpus_run: B5 breadth-corpus clean-run net (property assertions, no numeric oracle); per-PR smoke subset + CORPUS_FULL=1 nightly
